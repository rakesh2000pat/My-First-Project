<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Child Marriage Prevention Dashboard · Bihar 2026</title>
<style>
/* ── RESET & TOKENS ───────────────────────────────── */
:root{
  --p:#7C3AED;--t:#0D9488;--o:#EA580C;--pk:#DB2777;
  --b:#2563EB;--g:#16A34A;--gd:#CA8A04;--c2:#9333EA;--c3:#0891B2;
  --bg:#F0F2F8;--card:#fff;--bdr:#E5E7EB;--txt:#1F2937;--mu:#6B7280;--lt:#9CA3AF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* ── HEADER ──────────────────────────────────────── */
.hdr{
  background:linear-gradient(135deg,#4C1D95 0%,#7C3AED 60%,#0D9488 100%);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:200;
  box-shadow:0 3px 12px rgba(76,29,149,.35)
}
.hdr-l h1{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.2px}
.hdr-l p{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);
  backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);
  border-radius:999px;padding:5px 13px;font-size:11px;font-weight:700;color:#fff}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0;transition:background .4s}
.dot.live{background:#4ADE80;box-shadow:0 0 0 3px rgba(74,222,128,.3);animation:pulse 2s infinite}
.dot.err{background:#F87171}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(74,222,128,.25)}50%{box-shadow:0 0 0 7px rgba(74,222,128,.07)}}
.badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:12px;font-weight:800;padding:5px 14px;border-radius:999px}
.last-upd{font-size:10px;color:rgba(255,255,255,.65);font-weight:600}

/* ── BANNER ──────────────────────────────────────── */
#banner{display:none;padding:9px 20px;font-size:12px;font-weight:600;text-align:center}
#banner.ok{background:#D1FAE5;color:#065F46;display:block}
#banner.warn{background:#FEF3C7;color:#78350F;display:block}
#banner.err{background:#FEE2E2;color:#7F1D1D;display:block}

/* ── LAYOUT ──────────────────────────────────────── */
.page{max-width:1280px;margin:0 auto;padding:18px 16px;display:flex;flex-direction:column;gap:18px}

/* ── SUMMARY STRIP ───────────────────────────────── */
.strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.strip-card{background:linear-gradient(135deg,var(--cl1),var(--cl2));
  border-radius:14px;padding:14px 16px;color:#fff;position:relative;overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.12)}
.strip-card::after{content:attr(data-ico);position:absolute;right:-4px;bottom:-8px;
  font-size:48px;opacity:.15;line-height:1}
.strip-val{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px}
.strip-lbl{font-size:11px;font-weight:700;opacity:.9}
.strip-sub{font-size:10px;opacity:.7;margin-top:2px}

/* ── FILTER BAR ──────────────────────────────────── */
.filter-card{background:#fff;border-radius:14px;border:1px solid var(--bdr);
  box-shadow:0 1px 4px rgba(0,0,0,.05);padding:14px 18px}
.filter-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px}
.fw label{display:block;font-size:10px;font-weight:800;color:var(--mu);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.fw select{width:100%;font-size:12px;border:1.5px solid var(--bdr);border-radius:8px;
  padding:7px 10px;background:#fff;color:var(--txt);cursor:pointer}
.fw select:focus{outline:none;border-color:var(--p)}
.filter-count{font-size:11px;color:var(--mu);margin-top:10px;font-weight:600}

/* ── SECTION TITLE ───────────────────────────────── */
.sec{font-size:11px;font-weight:800;color:var(--mu);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ── KPI GRID ────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.kpi{background:#fff;border-radius:14px;border:1px solid var(--bdr);
  box-shadow:0 1px 5px rgba(0,0,0,.06);padding:15px;display:flex;gap:12px;
  transition:transform .15s,box-shadow .15s;cursor:default}
.kpi:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.1)}
.kpi-ico{border-radius:12px;padding:10px;font-size:20px;flex-shrink:0;line-height:1;align-self:flex-start}
.kpi-val{font-size:28px;font-weight:900;line-height:1;margin-bottom:3px}
.kpi-lbl{font-size:12px;font-weight:700;color:#374151}
.kpi-sub{font-size:10px;color:var(--lt);margin-top:2px}
.kpi-trend{font-size:10px;margin-top:5px;font-weight:700}

/* ── CHART GRID ──────────────────────────────────── */
.crow{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.cc{background:#fff;border-radius:14px;border:1px solid var(--bdr);
  box-shadow:0 1px 5px rgba(0,0,0,.05);padding:18px}
.ct{font-size:12px;font-weight:800;color:#374151;margin-bottom:14px;
  display:flex;align-items:center;gap:7px}
.ct::before{content:'';display:inline-block;width:4px;height:16px;
  border-radius:3px;background:var(--p);flex-shrink:0}

/* ── BAR CHART ───────────────────────────────────── */
.bg{display:flex;align-items:flex-end;gap:6px;height:170px;
  padding:0 2px;border-left:2px solid var(--bdr);border-bottom:2px solid var(--bdr)}
.bc{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;
  height:100%;justify-content:flex-end}
.br{width:100%;border-radius:5px 5px 0 0;min-height:2px;cursor:pointer;transition:opacity .15s}
.br:hover{opacity:.72}
.bl{font-size:9px;color:var(--mu);text-align:center;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;width:100%}
.bv{font-size:9px;font-weight:700;text-align:center;color:#374151}
.leg{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu)}
.ls{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── LINE CHART ──────────────────────────────────── */
/* SVG-based, rendered inline */

/* ── DONUT / PIE ─────────────────────────────────── */
.pw{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.pl{display:flex;flex-direction:column;gap:8px}
.pi{display:flex;align-items:center;gap:8px;font-size:12px}
.pd{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.pn{color:var(--mu);flex:1}
.pv{font-weight:800;color:#111;min-width:28px;text-align:right}

/* ── PROGRESS ────────────────────────────────────── */
.prg{display:flex;flex-direction:column;gap:13px}
.ph{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.plb{font-weight:700;color:#4B5563}
.pv2{font-weight:800;color:#111}
.pt{background:#F3F4F6;border-radius:999px;height:12px;overflow:hidden}
.pf{height:100%;border-radius:999px;transition:width .6s ease}

/* ── HEATMAP ─────────────────────────────────────── */
.hm{display:grid;gap:4px}
.hm-row{display:flex;gap:4px;align-items:center}
.hm-lbl{font-size:10px;color:var(--mu);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm-cell{flex:1;height:24px;border-radius:4px;cursor:pointer;transition:opacity .15s}
.hm-cell:hover{opacity:.75}
.hm-hdr{display:flex;gap:4px;padding-left:84px;margin-bottom:2px}
.hm-hdr span{flex:1;font-size:9px;color:var(--mu);text-align:center}

/* ── DATA TABLE ──────────────────────────────────── */
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#F5F3FF;color:var(--p);font-weight:800;padding:8px 10px;
  text-align:left;border-bottom:2px solid #DDD6FE;white-space:nowrap;position:sticky;top:0}
td{padding:7px 10px;border-bottom:1px solid var(--bdr);color:#374151}
tr:hover td{background:#FAFAFA}
tr:last-child td{border:none}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.tag-yes{background:#D1FAE5;color:#065F46}
.tag-no{background:#FEE2E2;color:#991B1B}

/* ── TOOLTIP ─────────────────────────────────────── */
.tt{position:fixed;background:#1F2937;color:#fff;border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,.25);padding:10px 14px;font-size:12px;
  pointer-events:none;z-index:9999;display:none;max-width:220px}
.tt.on{display:block}
.ttt{font-weight:800;margin-bottom:5px;font-size:13px}
.ttr{display:flex;align-items:center;gap:6px;margin-bottom:2px;opacity:.9}

/* ── LOADER ──────────────────────────────────────── */
#ldr{position:fixed;inset:0;background:rgba(255,255,255,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:14px;transition:opacity .4s}
.sp{width:44px;height:44px;border:4px solid #EDE9FE;border-top-color:var(--p);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#lm{font-size:14px;color:var(--mu);font-weight:700}
#ls{font-size:12px;color:var(--lt)}

/* ── FOOTER ──────────────────────────────────────── */
.footer{text-align:center;font-size:11px;color:var(--lt);padding:6px 0 22px;line-height:1.8}

/* ── NO-DATA ─────────────────────────────────────── */
.nd{height:120px;display:flex;align-items:center;justify-content:center;
  color:var(--lt);font-size:13px;flex-direction:column;gap:6px}
</style>
</head>

  oos_girls:["oosc_total_g","oos_girls","linkage_out_of_school_children/oosc_total_g","oos_g","out_school_girls"],
  oos_boys:["oosc_total_b","oos_boys","linkage_out_of_school_children/oosc_total_b","oos_b","out_school_boys"],
  cp_m:["community_part_m","cp_m","community_program/total_participants_group/community_part_m","dialogue_men"],
  cp_f:["community_part_f","cp_f","community_program/total_participants_group/community_part_f","dialogue_women"],
  cp_g:["community_part_g","cp_g","community_program/total_participants_group/community_part_g","dialogue_girls"],
  cp_b:["community_part_b","cp_b","community_program/total_participants_group/community_part_b","dialogue_boys"],
  pcwpc:["pcwpc_formed","pcwpc","gp_demographics/pcwpc_formed","pcwpc_established"],
  vuln_map:["vulnerability_mapping","vuln_map","public_helplines/vulnerability_mapping","mapping_done"],

  pol112:["helpline_112","pol112","public_helplines/helpline_112","112_painted","painted_112"],
  wh181:["helpline_181","wh181","public_helplines/helpline_181","181_painted","painted_181"]
};

function gf(row,keys){
  // exact match
  for(var i=0;i<keys.length;i++){var v=row[keys[i]];if(v!==undefined&&v!==null&&v!=="")return v;}
  // partial key scan (catches any group prefix)
  var rkeys=Object.keys(row);
  for(var i=0;i<keys.length;i++){
    var needle=keys[i].split("/").pop().toLowerCase();
    for(var j=0;j<rkeys.length;j++){
      if(rkeys[j].toLowerCase()===needle||rkeys[j].toLowerCase().endsWith("/"+needle)){
        var v=row[rkeys[j]];if(v!==undefined&&v!==null&&v!=="")return v;
      }
    }
  }
  return null;
}

function yn(v){var s=String(v||"").toLowerCase().trim();return(s==="yes"||s==="1"||s==="true")?"yes":"no";}
function n(v){return isNaN(Number(v))?0:Number(v);}
function fmtM(v){
  if(!v)return"Unknown";
  try{var d=new Date(v);if(!isNaN(d))return d.toLocaleDateString("en-IN",{month:"short",year:"numeric"});}catch(e){}
  return String(v).slice(0,10);
}

function mapRow(raw){
  return{
    district:gf(raw,FM.district)||"Unknown",
    block:gf(raw,FM.block)||"Unknown",
    partner:gf(raw,FM.partner)||"Unknown",
    month:fmtM(gf(raw,FM.month)),
    cm_prevented:n(gf(raw,FM.cm_prevented)),
    sbc_reach:n(gf(raw,FM.sbc_reach)),
    pcma:n(gf(raw,FM.pcma)),
    jj:n(gf(raw,FM.jj)),
    pocso:n(gf(raw,FM.pocso)),
    sops:n(gf(raw,FM.sops)),
    vuln_m:n(gf(raw,FM.vuln_m)),
    vuln_f:n(gf(raw,FM.vuln_f)),
    adol_groups:n(gf(raw,FM.adol_groups)),
    oos_girls:n(gf(raw,FM.oos_girls)),
    oos_boys:n(gf(raw,FM.oos_boys)),
    cp_m:n(gf(raw,FM.cp_m)),
    cp_f:n(gf(raw,FM.cp_f)),
    cp_g:n(gf(raw,FM.cp_g)),
    cp_b:n(gf(raw,FM.cp_b)),
    pcwpc:yn(gf(raw,FM.pcwpc)),
    vuln_map:yn(gf(raw,FM.vuln_map)),
    ch1098:yn(gf(raw,FM.ch1098)),
    pol112:yn(gf(raw,FM.pol112)),
    wh181:yn(gf(raw,FM.wh181))
  };
}

// ══════════════════════════════════════════════════════════
//  DATA LOADING STRATEGY
//  1. Instantly show built-in rows → no blank ever
//  2. Try loading data.json (committed by GitHub Actions)
//  3. data.json has the real KoboToolbox data, no CORS issue
// ══════════════════════════════════════════════════════════
async function loadData(){
  // Step 1 — show built-in data immediately
  RAW=BUILTIN_ROWS.slice();
  DATA=RAW.slice();
  rebuildF();renderAll();hideLoader();
  setBanner("warn","⏳ Loading latest data from server…");

  // Step 2 — try data.json (written by GitHub Actions every hour)
  try{
    var r=await fetch("data.json?_="+Date.now(),{cache:"no-store"});
    if(!r.ok) throw new Error("data.json not found (HTTP "+r.status+")");
    var j=await r.json();
    // data.json is either the raw KoboToolbox API response or pre-processed rows
    var rows=[];
    if(Array.isArray(j)) rows=j;                       // pre-processed array
    else if(j.results&&Array.isArray(j.results)) rows=j.results.map(mapRow); // raw API response
    if(!rows.length) throw new Error("data.json has 0 rows");
    // If already mapped (has 'district' key), use as-is; otherwise map
    if(rows[0].district===undefined) rows=rows.map(mapRow);
    RAW=rows; DATA=RAW.slice();
    dataSource="data.json (GitHub Actions live sync)";
    rebuildF(); renderAll();
    setDot("live","🟢 Live — "+RAW.length+" submissions");
    setBanner("ok","✅ Live data loaded — "+RAW.length+" submissions from KoboToolbox");
    setTimeout(function(){document.getElementById("banner").style.display="none";},5000);
    document.getElementById("last-upd").textContent="Updated "+new Date().toLocaleTimeString("en-IN");
  }catch(e){
    // data.json doesn't exist yet — that's fine, built-in data shows
    dataSource="built-in data";
    setDot("","📦 "+RAW.length+" built-in records");
    setBanner("warn","ℹ️ Showing "+RAW.length+" built-in records. GitHub Actions will sync live data hourly once configured. See footer for setup instructions.");
  }
  updFooter();
  document.getElementById("sub-badge").textContent=RAW.length+" Records";
  document.getElementById("hdr-date").textContent=new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"});
}

// auto-reload every 10 min to pick up fresh data.json
setInterval(function(){loadData();},600000);

function uniq(arr){return["All"].concat(Array.from(new Set(arr.filter(Boolean))).sort());}
function pop(id,vals){var s=document.getElementById(id),pv=s.value;while(s.options.length)s.remove(0);vals.forEach(function(v){var o=document.createElement("option");o.value=o.textContent=v;s.appendChild(o);});if(vals.indexOf(pv)>-1)s.value=pv;}
function rebuildF(){
  pop("fd",uniq(RAW.map(function(r){return r.district;})));
  pop("fp",uniq(RAW.map(function(r){return r.partner;})));
  pop("fb",uniq(RAW.map(function(r){return r.block;})));
  pop("fm",uniq(RAW.map(function(r){return r.month;})));
}
function applyF(){
  var d=document.getElementById("fd").value,p=document.getElementById("fp").value,
      b=document.getElementById("fb").value,m=document.getElementById("fm").value;
  DATA=RAW.filter(function(r){return(d==="All"||r.district===d)&&(p==="All"||r.partner===p)&&(b==="All"||r.block===b)&&(m==="All"||r.month===m);});
  document.getElementById("fcnt").textContent="Showing "+DATA.length+" of "+RAW.length+" records";
  renderAll();
}

function sum(a,k){return a.reduce(function(s,r){return s+n(r[k]);},0);}
function cnt(a,k,v){return a.filter(function(r){return String(r[k]||"").toLowerCase()===v;}).length;}
function grp(a,key,fn){
  var m={};a.forEach(function(r){var k=r[key]||"Unknown";if(!m[k])m[k]={label:k};fn(m[k],r);});
  return Object.values(m);
}

function noData(msg){return'<div class="nd"><span style="font-size:28px">📭</span>'+(msg||"No data for this filter")+'</div>';}

function barChart(el,data,lk,series,opts){
  opts=opts||{};
  if(!el||!data.length){if(el)el.innerHTML=noData();return;}
  var maxV=Math.max.apply(null,[1].concat(data.map(function(d){return Math.max.apply(null,series.map(function(s){return n(d[s.k]);}));})));
  var H=170;
  var html=data.map(function(d,di){
    var bars=series.map(function(s,si){
      var v=n(d[s.k]),h=Math.max(2,Math.round((v/maxV)*(H-22)));
      var col=s.c||PAL[(di*3+si)%PAL.length],w=series.length>1?"42%":"72%";
      var ti=esc(d[lk]),sl=esc(s.l||s.k);
      return'<div class="br" style="height:'+h+'px;background:'+col+';width:'+w+';display:inline-block;margin:0 1px" onmouseenter="stt(event,\''+ti+'\',[{l:\''+sl+'\',v:'+v+',c:\''+col+'\'}])" onmouseleave="htt()"></div>';
    }).join("");
    var vl=series.length===1?n(d[series[0].k]):"";
    return'<div class="bc"><div style="display:flex;align-items:flex-end;justify-content:center;width:100%">'+bars+'</div><div class="bv">'+vl+'</div><div class="bl" style="font-size:'+(data.length>7?8:10)+'px">'+d[lk]+'</div></div>';
  }).join("");
  var leg=opts.legend&&series.length>1?'<div class="leg">'+series.map(function(s){return'<div class="li"><div class="ls" style="background:'+s.c+'"></div>'+s.l+'</div>';}).join("")+'</div>':"";
  el.innerHTML='<div><div class="bg">'+html+'</div>'+leg+'</div>';
}

function lineChart(el,data,xk,yk,col){
  col=col||"#7C3AED";
  if(!el||!data.length){if(el)el.innerHTML=noData();return;}
  var W=460,H=145,PL=28,PT=8,PR=14,PB=26;
  var iW=W-PL-PR,iH=H-PT-PB;
  var maxY=Math.max.apply(null,[1].concat(data.map(function(d){return d[yk];})));
  var xs=data.map(function(_,i){return PL+(i/Math.max(data.length-1,1))*iW;});
  var ys=data.map(function(d){return PT+iH-(d[yk]/maxY)*iH;});
  var pts=xs.map(function(x,i){return x+","+ys[i];}).join(" ");
  var fill=pts+" "+(PL+iW)+","+(PT+iH)+" "+PL+","+(PT+iH);
  var ticks=[0,Math.round(maxY/2),maxY].map(function(v){
    var y=PT+iH-(v/maxY)*iH;
    return'<line x1="'+PL+'" y1="'+y+'" x2="'+(PL+iW)+'" y2="'+y+'" stroke="#F3F4F6" stroke-width="1.2"/>'+
      '<text x="'+(PL-3)+'" y="'+(y+4)+'" font-size="9" fill="#9CA3AF" text-anchor="end">'+v+'</text>';
  }).join("");
  var dots=data.map(function(d,i){
    var lbl=esc(d[xk]),fsx=data.length>6?8:10;
    return'<circle cx="'+xs[i]+'" cy="'+ys[i]+'" r="4.5" fill="'+col+'" stroke="#fff" stroke-width="2" style="cursor:pointer" onmouseenter="stt(event,\''+lbl+'\',[{l:\'Count\',v:'+d[yk]+',c:\''+col+'\'}])" onmouseleave="htt()"/>'+
      '<text x="'+xs[i]+'" y="'+(H-3)+'" font-size="'+fsx+'" fill="#9CA3AF" text-anchor="middle">'+d[xk]+'</text>';
  }).join("");
  el.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;overflow:visible">'+
    '<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".18"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'+
    ticks+'<polygon points="'+fill+'" fill="url(#lg)"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg>';
}

function pieChart(el,data,cols){
  if(!el)return;
  var total=data.reduce(function(s,d){return s+d.v;},0)||1;
  var R=64,r=38,CX=76,CY=76,ang=-Math.PI/2;
  var paths=data.map(function(d,i){
    var a=(d.v/total)*2*Math.PI;if(a<0.005){ang+=a;return"";}
    var x1=CX+R*Math.cos(ang),y1=CY+R*Math.sin(ang);ang+=a;
    var x2=CX+R*Math.cos(ang),y2=CY+R*Math.sin(ang);
    var xi=CX+r*Math.cos(ang-a),yi=CY+r*Math.sin(ang-a);
    var xj=CX+r*Math.cos(ang),yj=CY+r*Math.sin(ang);
    var lg=a>Math.PI?1:0;
    var nm=esc(d.n);
    return'<path d="M'+xi+','+yi+' A'+r+','+r+' 0 '+lg+' 1 '+xj+','+yj+' L'+x2+','+y2+' A'+R+','+R+' 0 '+lg+' 0 '+x1+','+y1+' Z" fill="'+cols[i]+'" style="cursor:pointer" onmouseenter="stt(event,\''+nm+'\',[{l:\'Count\',v:'+d.v+',c:\''+cols[i]+'\'}])" onmouseleave="htt()"/>';
  }).join("");
  var legend=data.map(function(d,i){
    return'<div class="pi"><span class="pd" style="background:'+cols[i]+'"></span><span class="pn">'+d.n+'</span><span class="pv">'+d.v+'</span></div>';
  }).join("");
  el.innerHTML='<div class="pw"><svg viewBox="0 0 152 152" width="140" height="140">'+paths+'</svg><div class="pl">'+legend+'</div></div>';
}

function progChart(el,items,total,cols){
  if(!el)return;
  el.innerHTML='<div class="prg">'+items.map(function(d,i){
    var pct=total>0?Math.round((d.v/total)*100):0;
    return'<div><div class="ph"><span class="plb">'+d.n+'</span><span class="pv2">'+d.v+'/'+total+' ('+pct+'%)</span></div>'+
      '<div class="pt"><div class="pf" style="width:'+pct+'%;background:'+(cols[i]||PAL[i])+'"></div></div></div>';
  }).join("")+'</div>';
}

// stacked bar (horizontal) — for gender breakdown

    var card=document.createElement("div");card.className="cc";
    card.innerHTML='<div class="ct">'+title+'</div><div id="cc-'+id+'"></div>';
    document.getElementById(rowId).appendChild(card);
    return document.getElementById("cc-"+id);
  }
  ["r1","r2","r3","r4","r5"].forEach(function(r){document.getElementById(r).innerHTML="";});

  // ── ROW 1: Submissions over time + CM by District ──
  var mMap={};d.forEach(function(r){mMap[r.month]=(mMap[r.month]||0)+1;});
  lineChart(cc("r1","line","📈 Submissions Over Time"),
    Object.entries(mMap).sort().map(function(e){return{m:e[0],c:e[1]};}),"m","c","#7C3AED");
  barChart(cc("r1","cm-d","🛡️ Child Marriages Prevented — by District"),
    grp(d,"district",function(g,r){g.v=(g.v||0)+n(r.cm_prevented);}).sort(function(a,b){return b.v-a.v;}),
    "label",[{k:"v",l:"CM Prevented",c:"#DB2777"}]);

  // ── ROW 2: Training breakdown + Community Dialogue pie ──
  barChart(cc("r2","train","📚 Training Participants by Programme"),
    [{label:"PCMA",v:sum(d,"pcma")},{label:"JJ Act",v:sum(d,"jj")},{label:"POCSO",v:sum(d,"pocso")},{label:"SOPs",v:sum(d,"sops")}],
    "label",[{k:"v",l:"Participants",c:"#7C3AED"}]);
  pieChart(cc("r2","comm","🤝 Community Dialogue — Participant Type"),
    [{n:"Men",v:sum(d,"cp_m")},{n:"Women",v:sum(d,"cp_f")},{n:"Girls",v:sum(d,"cp_g")},{n:"Boys",v:sum(d,"cp_b")}],
    ["#7C3AED","#0D9488","#EA580C","#DB2777"]);

  // ── ROW 3: Vulnerable children stacked + OOS ──
  hbarChart(cc("r3","vuln","👶 Vulnerable Children — Gender Split by District"),
    grp(d,"district",function(g,r){g.m=(g.m||0)+n(r.vuln_m);g.f=(g.f||0)+n(r.vuln_f);}));
  var oosd=grp(d,"block",function(g,r){g.g=(g.g||0)+n(r.oos_girls);g.b=(g.b||0)+n(r.oos_boys);})
    .filter(function(x){return(x.g||0)+(x.b||0)>0;});
  var oosEl=cc("r3","oos","🏫 Out-of-School Children — by Block");
  if(oosd.length)barChart(oosEl,oosd,"label",[{k:"g",l:"Girls",c:"#DB2777"},{k:"b",l:"Boys",c:"#2563EB"}],{legend:true});
  else oosEl.innerHTML=noData("No out-of-school children identified in this filter");

  // ── ROW 4: Helplines progress + SBC reach by district ──
  progChart(cc("r4","hlp","📞 Helpline Numbers Painted in Public Spaces"),
    [{n:"Childhelp 1098",v:cnt(d,"ch1098","yes")},{n:"Police 112",v:cnt(d,"pol112","yes")},{n:"Women HL 181",v:cnt(d,"wh181","yes")}],
    nt,["#16A34A","#2563EB","#DB2777"]);
  barChart(cc("r4","sbc","📣 SBC Campaign Reach — by District"),
    grp(d,"district",function(g,r){g.v=(g.v||0)+n(r.sbc_reach);}),
    "label",[{k:"v",l:"People Reached",c:"#0D9488"}]);

  // ── ROW 5: Partner coverage pie + Adol. groups by district ──
  var pMap={};d.forEach(function(r){pMap[r.partner]=(pMap[r.partner]||0)+1;});
  var pEntries=Object.entries(pMap).sort(function(a,b){return b[1]-a[1];});
  pieChart(cc("r5","part","🏢 Partner Coverage — Submissions by Organisation"),
    pEntries.map(function(e){return{n:e[0],v:e[1]};}),PAL);
  barChart(cc("r5","adol","👥 Adolescent Groups — by District"),
    grp(d,"district",function(g,r){g.v=(g.v||0)+n(r.adol_groups);}),
    "label",[{k:"v",l:"Groups",c:"#0D9488"}]);

  // ── DATA TABLE ──
  var cols=["district","block","partner","month","cm_prevented","vuln_f","vuln_m","adol_groups","oos_girls","oos_boys","sbc_reach","pcwpc","vuln_map","ch1098","pol112","wh181"];
  var hdrs=["District","Block","Partner","Month","CM Prev.","Vuln ♀","Vuln ♂","Adol Grp","OOS ♀","OOS ♂","SBC Reach","PCWPC","V-Map","1098","112","181"];
  var yn_cols=["pcwpc","vuln_map","ch1098","pol112","wh181"];
  document.getElementById("dtable").innerHTML=
    '<thead><tr>'+hdrs.map(function(h){return'<th>'+h+'</th>';}).join("")+'</tr></thead>'+
    '<tbody>'+d.map(function(r){
      return'<tr>'+cols.map(function(c){
        var v=r[c];
        if(yn_cols.indexOf(c)>-1)v='<span class="tag '+(v==="yes"?"tag-yes":"tag-no")+'">'+v+'</span>';
        return'<td>'+v+'</td>';
      }).join("")+'</tr>';
    }).join("")+'</tbody>';

  document.getElementById("fcnt").textContent="Showing "+nt+" of "+RAW.length+" records";
}

// ══════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════
loadData();
</script>
