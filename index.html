<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Child Marriage Prevention Dashboard · Bihar 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F3F4F6;color:#1F2937;min-height:100vh}
h1{font-size:20px;font-weight:800;color:#111827}
h2{font-size:13px;font-weight:700;color:#374151;margin-bottom:14px;display:flex;align-items:center;gap:8px}
h2::before{content:'';display:inline-block;width:4px;height:18px;border-radius:4px;background:#7C3AED;flex-shrink:0}
.header{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.badge{background:#EDE9FE;color:#7C3AED;font-size:12px;font-weight:700;padding:5px 14px;border-radius:999px}
.page{max-width:1200px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border-radius:16px;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.kpi{background:#fff;border-radius:14px;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:16px;display:flex;align-items:flex-start;gap:12px}
.kpi-icon{border-radius:12px;padding:10px;font-size:20px;flex-shrink:0;line-height:1}
.kpi-val{font-size:26px;font-weight:800;color:#111827;line-height:1.1}
.kpi-lbl{font-size:12px;font-weight:600;color:#374151;margin-top:3px}
.kpi-sub{font-size:11px;color:#9CA3AF;margin-top:3px}
.chart-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.chart-card{background:#fff;border-radius:16px;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.filter-wrap label{display:block;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.filter-wrap select{width:100%;font-size:13px;border:1px solid #D1D5DB;border-radius:9px;padding:8px 12px;background:#fff;color:#374151;cursor:pointer}
.bar-chart{width:100%;overflow:hidden}
.bar-group{display:flex;align-items:flex-end;gap:6px;height:180px;padding:0 4px;border-left:2px solid #E5E7EB;border-bottom:2px solid #E5E7EB}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;height:100%;justify-content:flex-end}
.bar-rect{width:100%;border-radius:5px 5px 0 0;min-height:2px;cursor:pointer;transition:opacity .2s}
.bar-rect:hover{opacity:.75}
.bar-label{font-size:10px;color:#6B7280;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.bar-val{font-size:10px;font-weight:700;color:#374151;text-align:center}
.pie-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.pie-legend{display:flex;flex-direction:column;gap:10px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.pie-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.pie-name{color:#6B7280}
.pie-num{font-weight:700;color:#111827;margin-left:auto;padding-left:16px}
.prog-list{display:flex;flex-direction:column;gap:16px;margin-top:10px}
.prog-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.prog-label{font-weight:600;color:#4B5563}
.prog-stat{font-weight:700;color:#111827}
.prog-track{background:#F3F4F6;border-radius:999px;height:12px;overflow:hidden}
.prog-fill{height:12px;border-radius:999px}
.tooltip{position:fixed;background:#fff;border:1px solid #E5E7EB;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:10px 14px;font-size:12px;pointer-events:none;z-index:9999;display:none;max-width:220px}
.tooltip.show{display:block}
.tooltip-title{font-weight:700;color:#374151;margin-bottom:5px}
.tooltip-row{display:flex;align-items:center;gap:6px;color:#374151;margin-bottom:2px}
.footer{text-align:center;font-size:11px;color:#9CA3AF;padding:10px 0 20px}
/* Loading overlay */
#loading{position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.spinner{width:44px;height:44px;border:4px solid #EDE9FE;border-top-color:#7C3AED;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:14px;color:#6B7280;font-weight:600}
/* Error banner */
#error-banner{display:none;background:#FEF3C7;border:1px solid #FCD34D;border-radius:10px;padding:12px 18px;font-size:12px;color:#92400E;margin:12px 20px;max-width:1160px;margin-left:auto;margin-right:auto}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <div id="load-msg">Connecting to KoboToolbox…</div>
</div>

<!-- Error banner (shown if fetch fails) -->
<div id="error-banner"></div>

<!-- HEADER -->
<div class="header">
  <div>
    <h1>Child Marriage Prevention Dashboard</h1>
    <div style="font-size:12px;color:#9CA3AF;margin-top:3px">Bihar Field Monitoring · <span id="hdr-date"></span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#6B7280;background:#F3F4F6;border-radius:999px;padding:5px 12px">
      <span id="live-dot" style="width:8px;height:8px;border-radius:50%;background:#D1D5DB;flex-shrink:0"></span>
      <span id="live-txt">Loading…</span>
    </div>
    <span class="badge" id="sub-badge">— Submissions</span>
  </div>
</div>

<!-- MAIN PAGE -->
<div class="page">

  <!-- Filters -->
  <div class="card">
    <div style="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">🔍 Filter Data</div>
    <div class="filters">
      <div class="filter-wrap"><label>District</label><select id="f-district" onchange="applyFilters()"></select></div>
      <div class="filter-wrap"><label>Partner Organisation</label><select id="f-partner" onchange="applyFilters()"></select></div>
      <div class="filter-wrap"><label>Block</label><select id="f-block" onchange="applyFilters()"></select></div>
    </div>
  </div>

  <!-- KPIs -->
  <div>
    <h2>Key Performance Indicators</h2>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>

  <!-- Charts -->
  <div id="charts-container"></div>

  <div class="footer" id="footer-txt"></div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tt"><div class="tooltip-title" id="tt-title"></div><div id="tt-body"></div></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Your KoboToolbox credentials — already embedded, no user input needed
var KOBO_TOKEN  = "12fd4d99b5dd976a7ec3c7ac652a86e3d9ac1389";
var KOBO_UID    = "adcLjEuy3acFyeBF45CKbT";
var KOBO_SERVER = "kf.kobotoolbox.org";
var REFRESH_MS  = 300000; // auto-refresh every 5 minutes

// CORS proxies tried in order — if one fails the next is used automatically
var PROXIES = [
  "https://corsproxy.io/?",
  "https://api.allorigins.win/raw?url=",
  "https://thingproxy.freeboard.io/fetch/"
];

// ─── PALETTE ─────────────────────────────────────────────────────────────────
var PAL    = ["#7C3AED","#0D9488","#EA580C","#DB2777","#2563EB","#16A34A","#CA8A04"];
var PURPLE = "#7C3AED", TEAL = "#0D9488", ORANGE = "#EA580C";
var PINK   = "#DB2777", BLUE = "#2563EB", GREEN  = "#16A34A", GOLD = "#CA8A04";

// ─── STATE ───────────────────────────────────────────────────────────────────
var RAW  = [];
var DATA = [];

// ─── FIELD MAP (KoboToolbox group/field paths) ────────────────────────────────
var FM = {
  district    : ["district","gp_demographics/district","District"],
  block       : ["block","gp_demographics/block","Block"],
  partner     : ["partner_org","partner","gp_demographics/partner_org","Partner"],
  month       : ["reporting_period","gp_demographics/reporting_period","_submission_time","start"],
  cm_prevented: ["cm_prevented","tracking_verification/cm_prevented"],
  sbc_reach   : ["sbc_reach_tot","SBC_Counselling/sbc_reach_tot","sbc_reach"],
  pcma        : ["pcma_sessions","capacity_building/pcma_sessions"],
  jj          : ["jj_sessions","capacity_building/jj_sessions"],
  pocso       : ["pocso_sessions","capacity_building/pocso_sessions"],
  sops        : ["sops_sessions","capacity_building/sops_sessions"],
  vuln_m      : ["vul_male_no","public_helplines/vul_male_no","vuln_m"],
  vuln_f      : ["vul_female_no","public_helplines/vul_female_no","vuln_f"],
  adol_groups : ["adolescent_groups","adolescent_groups/adolescent_groups"],
  oos_girls   : ["oosc_total_g","linkage_out_of_school_children/oosc_total_g"],
  oos_boys    : ["oosc_total_b","linkage_out_of_school_children/oosc_total_b"],
  cp_m        : ["community_part_m","community_program/total_participants_group/community_part_m"],
  cp_f        : ["community_part_f","community_program/total_participants_group/community_part_f"],
  cp_g        : ["community_part_g","community_program/total_participants_group/community_part_g"],
  cp_b        : ["community_part_b","community_program/total_participants_group/community_part_b"],
  pcwpc       : ["pcwpc_formed","gp_demographics/pcwpc_formed"],
  vuln_map    : ["vulnerability_mapping","public_helplines/vulnerability_mapping"],
  ch1098      : ["helpline_1098","public_helplines/helpline_1098"],
  pol112      : ["helpline_112","public_helplines/helpline_112"],
  wh181       : ["helpline_181","public_helplines/helpline_181"]
};

function getF(row, cands) {
  for (var i = 0; i < cands.length; i++) {
    var v = row[cands[i]];
    if (v !== undefined && v !== null && v !== "") return v;
  }
  return null;
}

function fmtMonth(v) {
  if (!v) return "Unknown";
  try {
    var d = new Date(v);
    if (isNaN(d)) return String(v).slice(0, 10);
    return d.toLocaleDateString("en-IN", {month:"short", year:"numeric"});
  } catch(e) { return String(v).slice(0, 10); }
}

function yesNo(v) {
  var s = String(v || "").toLowerCase().trim();
  return (s === "yes" || s === "1" || s === "true") ? "yes" : "no";
}

function mapRow(raw) {
  return {
    district    : getF(raw, FM.district)    || "Unknown",
    block       : getF(raw, FM.block)       || "Unknown",
    partner     : getF(raw, FM.partner)     || "Unknown",
    month       : fmtMonth(getF(raw, FM.month)),
    cm_prevented: Number(getF(raw, FM.cm_prevented))  || 0,
    sbc_reach   : Number(getF(raw, FM.sbc_reach))     || 0,
    pcma        : Number(getF(raw, FM.pcma))           || 0,
    jj          : Number(getF(raw, FM.jj))             || 0,
    pocso       : Number(getF(raw, FM.pocso))          || 0,
    sops        : Number(getF(raw, FM.sops))           || 0,
    vuln_m      : Number(getF(raw, FM.vuln_m))         || 0,
    vuln_f      : Number(getF(raw, FM.vuln_f))         || 0,
    adol_groups : Number(getF(raw, FM.adol_groups))    || 0,
    oos_girls   : Number(getF(raw, FM.oos_girls))      || 0,
    oos_boys    : Number(getF(raw, FM.oos_boys))       || 0,
    cp_m        : Number(getF(raw, FM.cp_m))           || 0,
    cp_f        : Number(getF(raw, FM.cp_f))           || 0,
    cp_g        : Number(getF(raw, FM.cp_g))           || 0,
    cp_b        : Number(getF(raw, FM.cp_b))           || 0,
    pcwpc       : yesNo(getF(raw, FM.pcwpc)),
    vuln_map    : yesNo(getF(raw, FM.vuln_map)),
    ch1098      : yesNo(getF(raw, FM.ch1098)),
    pol112      : yesNo(getF(raw, FM.pol112)),
    wh181       : yesNo(getF(raw, FM.wh181))
  };
}

// ─── FETCH WITH PROXY FALLBACK ────────────────────────────────────────────────
async function fetchWithProxies(targetUrl, headers) {
  var lastErr;
  for (var i = 0; i < PROXIES.length; i++) {
    try {
      var proxyUrl = PROXIES[i] + encodeURIComponent(targetUrl);
      var opts = { headers: headers || {} };
      var res = await fetch(proxyUrl, opts);
      if (!res.ok) throw new Error("HTTP " + res.status);
      var json = await res.json();
      return json;
    } catch(e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("All proxies failed");
}

// Fetch ALL pages (KoboToolbox paginates at 30 000 by default but we force limit)
async function fetchAllSubmissions() {
  var baseUrl = "https://" + KOBO_SERVER + "/api/v2/assets/" + KOBO_UID + "/data/?format=json&limit=30000";
  var hdrs = { "Authorization": "Token " + KOBO_TOKEN };
  var json = await fetchWithProxies(baseUrl, hdrs);
  var results = json.results || [];
  // If there are more pages, fetch them
  var next = json.next;
  while (next) {
    var more = await fetchWithProxies(next, hdrs);
    results = results.concat(more.results || []);
    next = more.next || null;
  }
  return results;
}

// ─── LOAD & RENDER ────────────────────────────────────────────────────────────
async function loadData() {
  setMsg("Connecting to KoboToolbox…");
  try {
    var rows = await fetchAllSubmissions();
    RAW  = rows.map(mapRow);
    DATA = RAW.slice();
    rebuildFilters();
    renderAll();
    setStatus("live", "Live · " + new Date().toLocaleTimeString("en-IN"));
    hideLoading();
    document.getElementById("footer-txt").textContent =
      "Source: KoboToolbox Live · Bihar · " + RAW.length + " submissions · Last updated " + new Date().toLocaleString("en-IN");
    document.getElementById("hdr-date").textContent =
      new Date().toLocaleDateString("en-IN", {month:"long", year:"numeric"});
    document.getElementById("sub-badge").textContent = RAW.length + " Submissions";
    hideError();
  } catch(e) {
    hideLoading();
    showError("Could not load live data: " + e.message + ". The page will retry in 30 seconds.");
    setStatus("error", "Connection error");
    setTimeout(loadData, 30000);
  }
}

// ─── STATUS ──────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  document.getElementById("live-txt").textContent = msg;
  document.getElementById("live-dot").style.background =
    state === "live" ? "#16A34A" : state === "error" ? "#DC2626" : "#CA8A04";
}
function setMsg(m) { document.getElementById("load-msg").textContent = m; }
function hideLoading() { document.getElementById("loading").style.display = "none"; }
function showError(m) {
  var el = document.getElementById("error-banner");
  el.style.display = "block";
  el.textContent = "⚠ " + m;
}
function hideError() { document.getElementById("error-banner").style.display = "none"; }

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function uniq(arr) {
  return ["All"].concat(Array.from(new Set(arr.filter(Boolean))).sort());
}
function populateSel(id, vals) {
  var s = document.getElementById(id);
  while (s.options.length) s.remove(0);
  vals.forEach(function(v) { var o = document.createElement("option"); o.value = o.textContent = v; s.appendChild(o); });
}
function rebuildFilters() {
  populateSel("f-district", uniq(RAW.map(function(r){return r.district;})));
  populateSel("f-partner",  uniq(RAW.map(function(r){return r.partner;})));
  populateSel("f-block",    uniq(RAW.map(function(r){return r.block;})));
}
function applyFilters() {
  var d = document.getElementById("f-district").value;
  var p = document.getElementById("f-partner").value;
  var b = document.getElementById("f-block").value;
  DATA = RAW.filter(function(r){
    return (d==="All"||r.district===d) && (p==="All"||r.partner===p) && (b==="All"||r.block===b);
  });
  renderAll();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function sum(arr, k) { return arr.reduce(function(s,r){return s+(Number(r[k])||0);}, 0); }
function cnt(arr, k, v) { return arr.filter(function(r){return String(r[k]||"").toLowerCase()===v;}).length; }

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
var tt = document.getElementById("tt");
function showTT(e, title, rows) {
  tt.className = "tooltip show";
  document.getElementById("tt-title").textContent = title;
  document.getElementById("tt-body").innerHTML = rows.map(function(r){
    return '<div class="tooltip-row"><span style="width:8px;height:8px;border-radius:50%;background:'+(r.color||"#374151")+';display:inline-block;flex-shrink:0"></span> '+r.label+': <strong>'+r.val+'</strong></div>';
  }).join("");
  tt.style.left = (e.clientX+14)+"px"; tt.style.top = (e.clientY-10)+"px";
}
function hideTT() { tt.className = "tooltip"; }
document.addEventListener("mousemove", function(e){
  if (tt.classList.contains("show")){ tt.style.left=(e.clientX+14)+"px"; tt.style.top=(e.clientY-10)+"px"; }
});

// ─── CHART: BAR ──────────────────────────────────────────────────────────────
function barChart(el, data, labelKey, series, opts) {
  opts = opts || {};
  if (!el || !data.length) {
    if (el) el.innerHTML = noData(); return;
  }
  var maxVal = Math.max.apply(null, [1].concat(data.map(function(d){
    return Math.max.apply(null, series.map(function(s){return Number(d[s.key])||0;}));
  })));
  var H = 180;
  var cols = data.map(function(d, di) {
    var bars = series.map(function(s, si) {
      var v = Number(d[s.key]) || 0;
      var h = Math.max(2, Math.round((v / maxVal) * (H - 20)));
      var col = s.color || PAL[(di+si) % PAL.length];
      var w = series.length > 1 ? "44%" : "80%";
      // build tooltip data inline-safe
      var tipLabel = (s.label || s.key).replace(/'/g,"");
      var tipTitle = String(d[labelKey]).replace(/'/g,"");
      return '<div class="bar-rect" style="height:'+h+'px;background:'+col+';width:'+w+';display:inline-block;margin:0 1px" '+
        'onmouseenter="showTT(event,\''+tipTitle+'\',[{label:\''+tipLabel+'\',val:'+v+',color:\''+col+'\'}])" onmouseleave="hideTT()"></div>';
    }).join("");
    var valLbl = series.length === 1 ? (Number(d[series[0].key])||0) : "";
    var fs = data.length > 6 ? 8 : 10;
    return '<div class="bar-col">'+bars+'<div class="bar-val">'+valLbl+'</div>'+
      '<div class="bar-label" style="font-size:'+fs+'px">'+d[labelKey]+'</div></div>';
  }).join("");
  var legend = "";
  if (opts.legend && series.length > 1) {
    legend = '<div style="display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap">'+
      series.map(function(s){
        return '<span style="font-size:11px;display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:'+s.color+';display:inline-block"></span>'+s.label+'</span>';
      }).join("")+'</div>';
  }
  el.innerHTML = '<div class="bar-chart"><div class="bar-group">'+cols+'</div>'+legend+'</div>';
}

// ─── CHART: LINE ─────────────────────────────────────────────────────────────
function lineChart(el, data, xKey, yKey) {
  if (!el) return;
  if (!data.length) { el.innerHTML = noData(); return; }
  var W=500, H=160, PL=32, PT=10, PR=20, PB=30;
  var iW=W-PL-PR, iH=H-PT-PB;
  var maxY = Math.max.apply(null, [1].concat(data.map(function(d){return d[yKey];})));
  var xs = data.map(function(_,i){return PL+(i/Math.max(data.length-1,1))*iW;});
  var ys = data.map(function(d){return PT+iH-(d[yKey]/maxY)*iH;});
  var pts = xs.map(function(x,i){return x+","+ys[i];}).join(" ");
  var fill = pts+" "+xs[xs.length-1]+","+(PT+iH)+" "+xs[0]+","+(PT+iH);
  var ticks = [0, Math.ceil(maxY/2), maxY].map(function(v){
    var y = PT+iH-(v/maxY)*iH;
    return '<line x1="'+PL+'" y1="'+y+'" x2="'+(PL+iW)+'" y2="'+y+'" stroke="#F3F4F6" stroke-width="1.5"/>'+
      '<text x="'+(PL-4)+'" y="'+(y+4)+'" font-size="10" fill="#9CA3AF" text-anchor="end">'+v+'</text>';
  }).join("");
  var dots = data.map(function(d,i){
    var lbl = String(d[xKey]).replace(/'/g,"");
    return '<circle cx="'+xs[i]+'" cy="'+ys[i]+'" r="5" fill="'+PURPLE+'" stroke="#fff" stroke-width="2" style="cursor:pointer" '+
      'onmouseenter="showTT(event,\''+lbl+'\',[{label:\'Submissions\',val:'+d[yKey]+',color:\''+PURPLE+'\'}])" onmouseleave="hideTT()"/>'+
      '<text x="'+xs[i]+'" y="'+(H-4)+'" font-size="10" fill="#6B7280" text-anchor="middle">'+d[xKey]+'</text>';
  }).join("");
  el.innerHTML = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;overflow:visible">'+
    '<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="'+PURPLE+'" stop-opacity=".18"/>'+
    '<stop offset="100%" stop-color="'+PURPLE+'" stop-opacity="0"/></linearGradient></defs>'+
    ticks+'<polygon points="'+fill+'" fill="url(#lg)"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="'+PURPLE+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+
    dots+'</svg>';
}

// ─── CHART: PIE ──────────────────────────────────────────────────────────────
function pieChart(el, data, colors) {
  if (!el) return;
  var total = data.reduce(function(s,d){return s+d.value;},0) || 1;
  var R=70, r=42, CX=90, CY=90, ang=-Math.PI/2;
  var slices = data.map(function(d, i) {
    var a = (d.value/total)*2*Math.PI;
    var x1=CX+R*Math.cos(ang), y1=CY+R*Math.sin(ang); ang+=a;
    var x2=CX+R*Math.cos(ang), y2=CY+R*Math.sin(ang);
    var xi=CX+r*Math.cos(ang-a), yi=CY+r*Math.sin(ang-a);
    var xj=CX+r*Math.cos(ang),   yj=CY+r*Math.sin(ang);
    var lg = a>Math.PI?1:0;
    return {path:"M"+xi+","+yi+" A"+r+","+r+" 0 "+lg+" 1 "+xj+","+yj+" L"+x2+","+y2+" A"+R+","+R+" 0 "+lg+" 0 "+x1+","+y1+" Z",
            color:colors[i], name:d.name, val:d.value};
  });
  var paths = slices.map(function(s){
    var n=String(s.name).replace(/'/g,"");
    return '<path d="'+s.path+'" fill="'+s.color+'" opacity=".9" style="cursor:pointer" '+
      'onmouseenter="showTT(event,\''+n+'\',[{label:\'Count\',val:'+s.val+',color:\''+s.color+'\'}])" onmouseleave="hideTT()"/>';
  }).join("");
  var legend = data.map(function(d,i){
    return '<div class="pie-legend-item"><span class="pie-dot" style="background:'+colors[i]+'"></span>'+
      '<span class="pie-name">'+d.name+'</span><span class="pie-num">'+d.value+'</span></div>';
  }).join("");
  el.innerHTML = '<div class="pie-wrap"><svg viewBox="0 0 180 180" width="160" height="160">'+paths+'</svg>'+
    '<div class="pie-legend">'+legend+'</div></div>';
}

// ─── CHART: PROGRESS ─────────────────────────────────────────────────────────
function progressChart(el, data, total, colors) {
  if (!el) return;
  el.innerHTML = '<div class="prog-list">'+data.map(function(d,i){
    var pct = total > 0 ? Math.round((d.painted/total)*100) : 0;
    return '<div><div class="prog-head"><span class="prog-label">'+d.name+'</span>'+
      '<span class="prog-stat">'+d.painted+'/'+total+' GPs ('+pct+'%)</span></div>'+
      '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%;background:'+(colors[i]||PAL[i])+'"></div></div></div>';
  }).join("")+'</div>';
}

function noData() {
  return '<div style="height:140px;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:13px">No data for this filter</div>';
}

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll() {
  var d = DATA, n = d.length;

  // KPIs
  var kpis = [
    {label:"Total Submissions",        icon:"📋",color:PURPLE, val:n,                                      sub:"Gram Panchayats"},
    {label:"Child Marriages Prevented",icon:"🛡️",color:PINK,   val:sum(d,"cm_prevented"),                  sub:"Reported cases stopped"},
    {label:"Vulnerable Children",      icon:"👧",color:ORANGE, val:sum(d,"vuln_m")+sum(d,"vuln_f"),        sub:"Identified across GPs"},
    {label:"Adolescent Groups",        icon:"👥",color:TEAL,   val:sum(d,"adol_groups"),                   sub:"Functional groups"},
    {label:"PCWPC Formed",             icon:"🏛️",color:BLUE,   val:cnt(d,"pcwpc","yes"),                   sub:"of total GPs"},
    {label:"Vulnerability Mapping",    icon:"🗺️",color:GREEN,  val:cnt(d,"vuln_map","yes"),                sub:"GPs conducted"},
    {label:"SBC Campaign Reach",       icon:"📣",color:GOLD,   val:sum(d,"sbc_reach"),                     sub:"People reached"},
    {label:"Out-of-School Children",   icon:"🏫",color:PURPLE, val:sum(d,"oos_girls")+sum(d,"oos_boys"),   sub:"Identified"},
  ];
  document.getElementById("kpi-grid").innerHTML = kpis.map(function(k){
    return '<div class="kpi"><div class="kpi-icon" style="background:'+k.color+'22">'+k.icon+'</div>'+
      '<div style="flex:1"><div class="kpi-val">'+k.val+'</div>'+
      '<div class="kpi-lbl">'+k.label+'</div>'+
      '<div class="kpi-sub">'+k.sub+'</div></div></div>';
  }).join("");

  // Charts
  var cc = document.getElementById("charts-container");
  cc.innerHTML = "";

  function row() {
    var items = Array.prototype.slice.call(arguments);
    var r = document.createElement("div");
    r.className = "chart-row"; r.style.marginBottom = "18px";
    items.forEach(function(c){r.appendChild(c);}); cc.appendChild(r);
  }
  function col(id, title) {
    var c = document.createElement("div"); c.className = "chart-card";
    c.innerHTML = '<h2>'+title+'</h2><div id="cc-'+id+'"></div>';
    return c;
  }
  function el(id){ return document.getElementById("cc-"+id); }

  // Row 1 — line + CM by district
  var c1 = col("line","Submissions Over Time");
  var c2 = col("cm","Child Marriages Prevented by District");
  row(c1, c2);
  var mMap = {};
  d.forEach(function(r){ mMap[r.month] = (mMap[r.month]||0)+1; });
  lineChart(el("line"),
    Object.entries(mMap).sort().map(function(e){return{month:e[0],count:e[1]};}),
    "month","count");
  var distCM = {};
  d.forEach(function(r){
    if(!distCM[r.district]) distCM[r.district]={district:r.district,cm_prevented:0};
    distCM[r.district].cm_prevented += Number(r.cm_prevented)||0;
  });
  barChart(el("cm"),
    Object.values(distCM).sort(function(a,b){return b.cm_prevented-a.cm_prevented;}),
    "district",[{key:"cm_prevented",label:"CM Prevented",color:PINK}]);

  // Row 2 — training + community
  var c3 = col("train","Training Participants by Programme");
  var c4 = col("comm","Community Dialogue Participants");
  row(c3, c4);
  barChart(el("train"),
    [{name:"PCMA",participants:sum(d,"pcma")},{name:"JJ Act",participants:sum(d,"jj")},
     {name:"POCSO",participants:sum(d,"pocso")},{name:"SOPs",participants:sum(d,"sops")}],
    "name",[{key:"participants",label:"Participants",color:PURPLE}]);
  pieChart(el("comm"),
    [{name:"Men",value:sum(d,"cp_m")},{name:"Women",value:sum(d,"cp_f")},
     {name:"Girls",value:sum(d,"cp_g")},{name:"Boys",value:sum(d,"cp_b")}],
    [PURPLE,TEAL,ORANGE,PINK]);

  // Row 3 — vulnerable + OOS
  var c5 = col("vuln","Vulnerable Children by District");
  var c6 = col("oos","Out-of-School Children by Block");
  row(c5, c6);
  var dv = {};
  d.forEach(function(r){
    if(!dv[r.district]) dv[r.district]={district:r.district,male:0,female:0};
    dv[r.district].male   += Number(r.vuln_m)||0;
    dv[r.district].female += Number(r.vuln_f)||0;
  });
  barChart(el("vuln"),Object.values(dv),"district",
    [{key:"male",label:"Boys",color:BLUE},{key:"female",label:"Girls",color:PINK}],{legend:true});
  var bo = {};
  d.forEach(function(r){
    if(!bo[r.block]) bo[r.block]={block:r.block,girls:0,boys:0};
    bo[r.block].girls += Number(r.oos_girls)||0;
    bo[r.block].boys  += Number(r.oos_boys)||0;
  });
  var oosData = Object.values(bo).filter(function(x){return x.girls>0||x.boys>0;});
  if(oosData.length)
    barChart(el("oos"),oosData,"block",[{key:"girls",label:"Girls",color:PINK},{key:"boys",label:"Boys",color:TEAL}],{legend:true});
  else
    el("oos").innerHTML = noData();

  // Row 4 — helplines + SBC
  var c7 = col("hlp","Helpline Numbers Painted in Public Spaces");
  var c8 = col("sbc","SBC Campaign Reach by District");
  row(c7, c8);
  progressChart(el("hlp"),
    [{name:"Childhelp 1098",painted:cnt(d,"ch1098","yes")},
     {name:"Police 112",   painted:cnt(d,"pol112","yes")},
     {name:"Women HL 181", painted:cnt(d,"wh181","yes")}],
    n,[PURPLE,ORANGE,PINK]);
  var ds = {};
  d.forEach(function(r){
    if(!ds[r.district]) ds[r.district]={district:r.district,sbc_reach:0};
    ds[r.district].sbc_reach += Number(r.sbc_reach)||0;
  });
  barChart(el("sbc"),Object.values(ds),"district",[{key:"sbc_reach",label:"People Reached",color:TEAL}]);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
loadData();
// Auto-refresh every 5 minutes silently in the background
setInterval(function(){
  fetchAllSubmissions().then(function(rows){
    RAW  = rows.map(mapRow);
    DATA = RAW.slice();
    rebuildFilters();
    renderAll();
    setStatus("live","Live · "+new Date().toLocaleTimeString("en-IN"));
    document.getElementById("sub-badge").textContent = RAW.length+" Submissions";
    document.getElementById("footer-txt").textContent =
      "Source: KoboToolbox Live · Bihar · "+RAW.length+" submissions · Last updated "+new Date().toLocaleString("en-IN");
  }).catch(function(){/* silently retry next cycle */});
}, REFRESH_MS);
</script>
