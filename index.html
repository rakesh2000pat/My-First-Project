<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Child Marriage Prevention · Bihar 2026</title>
<style>
:root{--purple:#7C3AED;--teal:#0D9488;--orange:#EA580C;--pink:#DB2777;--blue:#2563EB;--green:#16A34A;--gold:#CA8A04;--bg:#F3F4F6;--card:#fff;--border:#E5E7EB;--text:#1F2937;--muted:#6B7280;--light:#9CA3AF}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* HEADER */
.hdr{background:#fff;border-bottom:2px solid var(--purple);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(124,58,237,.10)}
.hdr-left h1{font-size:18px;font-weight:800;color:#111;letter-spacing:-.3px}
.hdr-left p{font-size:11px;color:var(--light);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;background:#F5F3FF;border:1px solid #DDD6FE;border-radius:999px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--purple)}
.dot{width:8px;height:8px;border-radius:50%;background:#D1D5DB;flex-shrink:0;transition:background .4s}
.dot.live{background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.2);animation:pulse 2s infinite}
.dot.err{background:#DC2626}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(22,163,74,.2)}50%{box-shadow:0 0 0 6px rgba(22,163,74,.05)}}
.badge{background:#EDE9FE;color:var(--purple);font-size:12px;font-weight:800;padding:5px 14px;border-radius:999px;border:1px solid #C4B5FD}
/* BANNER */
#banner{padding:10px 20px;font-size:12px;font-weight:600;text-align:center;display:none}
#banner.info{background:#EDE9FE;color:#4C1D95;display:block}
#banner.warn{background:#FEF3C7;color:#92400E;display:block}
#banner.err{background:#FEE2E2;color:#7F1D1D;display:block}
/* LAYOUT */
.page{max-width:1240px;margin:0 auto;padding:18px 16px;display:flex;flex-direction:column;gap:18px}
/* FILTERS */
.filter-card{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05);padding:16px 20px}
.filter-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.fw label{display:block;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.fw select{width:100%;font-size:13px;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;background:#fff;color:var(--text);cursor:pointer;transition:border-color .2s}
.fw select:focus{outline:none;border-color:var(--purple)}
/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.kpi{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);padding:16px;display:flex;align-items:flex-start;gap:12px;transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.kpi-ico{border-radius:12px;padding:10px;font-size:22px;flex-shrink:0;line-height:1}
.kpi-val{font-size:30px;font-weight:900;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:12px;font-weight:700;color:#374151}
.kpi-sub{font-size:11px;color:var(--light);margin-top:2px}
/* CHART GRID */
.chart-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.chart-card{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);padding:18px}
.chart-title{font-size:12px;font-weight:800;color:#374151;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.chart-title::before{content:'';display:inline-block;width:4px;height:16px;border-radius:3px;background:var(--purple);flex-shrink:0}
/* BAR */
.bar-wrap{width:100%;overflow:hidden}
.bar-group{display:flex;align-items:flex-end;gap:5px;height:170px;padding:0 2px;border-left:2px solid var(--border);border-bottom:2px solid var(--border)}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;height:100%;justify-content:flex-end}
.bar-rect{width:100%;border-radius:5px 5px 0 0;min-height:2px;cursor:pointer;transition:opacity .15s}
.bar-rect:hover{opacity:.75}
.bar-lbl{font-size:9px;color:var(--muted);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.bar-val{font-size:9px;font-weight:700;color:#374151;text-align:center}
/* PIE */
.pie-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.pie-legend{display:flex;flex-direction:column;gap:9px}
.pie-item{display:flex;align-items:center;gap:8px;font-size:12px}
.pie-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.pie-nm{color:var(--muted)}
.pie-n{font-weight:800;color:#111;margin-left:auto;padding-left:14px}
/* PROGRESS */
.prog-list{display:flex;flex-direction:column;gap:14px}
.prog-hd{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px}
.prog-lbl{font-weight:700;color:#4B5563}
.prog-val{font-weight:800;color:#111}
.prog-track{background:#F3F4F6;border-radius:999px;height:13px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;transition:width .5s ease}
/* TOOLTIP */
.tt{position:fixed;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.13);padding:10px 14px;font-size:12px;pointer-events:none;z-index:9999;display:none;max-width:220px}
.tt.on{display:block}
.tt-title{font-weight:800;color:#374151;margin-bottom:5px;font-size:13px}
.tt-row{display:flex;align-items:center;gap:6px;color:#374151;margin-bottom:2px}
/* DATA TABLE */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#F5F3FF;color:var(--purple);font-weight:800;padding:9px 12px;text-align:left;border-bottom:2px solid #DDD6FE;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border);color:#374151}
tr:last-child td{border:none}
tr:nth-child(even) td{background:#FAFAFA}
/* LEGEND BAR */
.leg{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-sq{width:10px;height:10px;border-radius:3px;flex-shrink:0}
/* FOOTER */
.footer{text-align:center;font-size:11px;color:var(--light);padding:6px 0 20px}
/* LOADING */
#loader{position:fixed;inset:0;background:rgba(255,255,255,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.spinner{width:46px;height:46px;border:4px solid #EDE9FE;border-top-color:var(--purple);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:14px;color:var(--muted);font-weight:700}
#load-sub{font-size:12px;color:var(--light);margin-top:-8px}
</style>
</head>

}

    return d.toLocaleDateString("en-IN",{month:"short",year:"numeric"});}
  catch(e){return String(v).slice(0,10);}
}

function mapRow(raw){
  return{
    _raw:raw,
    district:gf(raw,FM.district)||"Unknown",
    block:gf(raw,FM.block)||"Unknown",
    partner:gf(raw,FM.partner)||"Unknown",
    month:fmtM(gf(raw,FM.month)),
    cm_prevented:num(gf(raw,FM.cm_prevented)),
    sbc_reach:num(gf(raw,FM.sbc_reach)),
    pcma:num(gf(raw,FM.pcma)),
    jj:num(gf(raw,FM.jj)),
    pocso:num(gf(raw,FM.pocso)),
    sops:num(gf(raw,FM.sops)),
    vuln_m:num(gf(raw,FM.vuln_m)),
    vuln_f:num(gf(raw,FM.vuln_f)),
    adol_groups:num(gf(raw,FM.adol_groups)),
    oos_girls:num(gf(raw,FM.oos_girls)),
    oos_boys:num(gf(raw,FM.oos_boys)),
    cp_m:num(gf(raw,FM.cp_m)),
    cp_f:num(gf(raw,FM.cp_f)),
    cp_g:num(gf(raw,FM.cp_g)),
    cp_b:num(gf(raw,FM.cp_b)),
    pcwpc:yn(gf(raw,FM.pcwpc)),
    vuln_map:yn(gf(raw,FM.vuln_map)),
    ch1098:yn(gf(raw,FM.ch1098)),
    pol112:yn(gf(raw,FM.pol112)),
    wh181:yn(gf(raw,FM.wh181))
  };
}

// ════════════════════════════════════════════════════════════
// FETCH — 4 PROXY FALLBACKS + FALLBACK DATA
// ════════════════════════════════════════════════════════════
async function tryFetch(url, hdrs){
  var last;
  for(var i=0;i<PROXIES.length;i++){
    try{
      var purl=PROXIES[i](url);
      var res=await fetch(purl,{headers:hdrs,mode:"cors"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      var ct=res.headers.get("content-type")||"";
      var text=await res.text();
      // strip any HTML wrapper from proxy
      var json;
      try{json=JSON.parse(text);}
      catch(e){
        // allorigins wraps in {contents:"..."}
        try{var wrap=JSON.parse(text);json=JSON.parse(wrap.contents);}
        catch(e2){throw new Error("Invalid JSON from proxy "+i);}
      }
      return json;
    }catch(e){last=e;}
  }
  throw last||new Error("All proxies failed");
}

async function fetchKobo(){
  var url="https://"+SERVER+"/api/v2/assets/"+UID+"/data/?format=json&limit=30000";
  var hdrs={"Authorization":"Token "+TOKEN};
  var json=await tryFetch(url,hdrs);
  var results=json.results||[];
  // paginate
  var next=json.next;
  while(next){var more=await tryFetch(next,hdrs);results=results.concat(more.results||[]);next=more.next||null;}
  return results;
}

async function loadData(silent){
  if(!silent){lm("Connecting to KoboToolbox…","Trying live API…");}
  try{
    var rows=await fetchKobo();
    if(!rows.length) throw new Error("0 submissions returned");
    RAW=rows.map(mapRow);
    isLive=true;
    setBanner("","");
    setDot("live","🟢 Live KoboToolbox");
    showToast("✅ Loaded "+RAW.length+" live submissions");
  }catch(e){
    if(!isLive){
      // first load failed — use fallback
      RAW=FALLBACK.slice();
      setDot("err","⚠ Offline — showing built-in data");
      setBanner("warn","⚠ Could not reach KoboToolbox ("+e.message+"). Showing built-in data. Will auto-retry every 60 s.");
    }
    // keep existing data if already live
    setTimeout(function(){loadData(true);},60000);
  }
  DATA=RAW.slice();
  rebuildFilters();
  renderAll();
  hideLoader();
  updFooter();
  document.getElementById("sub-badge").textContent=RAW.length+" Submissions";
  document.getElementById("hdr-date").textContent=new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"});
}

// auto-refresh silently every 5 min when live
setInterval(function(){if(isLive)loadData(true);},300000);

var toastT;

// ════════════════════════════════════════════════════════════
// FILTERS
// ════════════════════════════════════════════════════════════
function uniq(arr){return["All"].concat(Array.from(new Set(arr.filter(Boolean))).sort());}
function pop(id,vals){
  var s=document.getElementById(id),prev=s.value;
  while(s.options.length)s.remove(0);
  vals.forEach(function(v){var o=document.createElement("option");o.value=o.textContent=v;s.appendChild(o);});
  if(vals.indexOf(prev)>-1)s.value=prev;
}
function rebuildFilters(){
  pop("f-dist", uniq(RAW.map(function(r){return r.district;})));
  pop("f-part", uniq(RAW.map(function(r){return r.partner;})));
  pop("f-block",uniq(RAW.map(function(r){return r.block;})));
  pop("f-month",uniq(RAW.map(function(r){return r.month;})));
}
function applyFilters(){
  var d=document.getElementById("f-dist").value;
  var p=document.getElementById("f-part").value;
  var b=document.getElementById("f-block").value;
  var m=document.getElementById("f-month").value;
  DATA=RAW.filter(function(r){
    return(d==="All"||r.district===d)&&(p==="All"||r.partner===p)&&(b==="All"||r.block===b)&&(m==="All"||r.month===m);
  });
  renderAll();
}

// ════════════════════════════════════════════════════════════
// AGGREGATION
// ════════════════════════════════════════════════════════════
function sum(a,k){return a.reduce(function(s,r){return s+num(r[k]);},0);}
function cnt(a,k,v){return a.filter(function(r){return String(r[k]||"").toLowerCase()===v;}).length;}
function grp(a,key,fn){
  var m={};
  a.forEach(function(r){var k=r[key]||"Unknown";if(!m[k])m[k]={label:k};fn(m[k],r);});
  return Object.values(m);
}

var tt=document.getElementById("tt");
function stt(e,title,rows){
  tt.className="tt on";
  document.getElementById("tt-t").textContent=title;
  document.getElementById("tt-b").innerHTML=rows.map(function(r){
    return'<div class="tt-row"><span style="width:8px;height:8px;border-radius:50%;background:'+(r.c||"#374151")+';display:inline-block;flex-shrink:0"></span> '+(r.l||"")+': <strong>'+(r.v||0)+'</strong></div>';
  }).join("");
  tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-10)+"px";
}
function htt(){tt.className="tt";}
document.addEventListener("mousemove",function(e){if(tt.classList.contains("on")){tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-10)+"px";}});

// ════════════════════════════════════════════════════════════
// CHARTS
// ════════════════════════════════════════════════════════════
function nd(){return'<div style="height:120px;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:13px">No data for this filter</div>';}

function barChart(el,data,lk,series,opts){
  opts=opts||{};
  if(!el||!data.length){if(el)el.innerHTML=nd();return;}
  var maxV=Math.max.apply(null,[1].concat(data.map(function(d){return Math.max.apply(null,series.map(function(s){return num(d[s.k]);}));})));
  var H=170;
  var cols=data.map(function(d,di){
    var bars=series.map(function(s,si){
      var v=num(d[s.k]);
      var h=Math.max(2,Math.round((v/maxV)*(H-20)));
      var col=s.c||P[(di*3+si)%P.length];
      var w=series.length>1?"44%":"76%";
      var ti=String(d[lk]).replace(/['"]/g,"");
      var sl=String(s.l||s.k).replace(/['"]/g,"");
      return'<div class="bar-rect" style="height:'+h+'px;background:'+col+';width:'+w+';display:inline-block;margin:0 1px" onmouseenter="stt(event,\''+ti+'\',[{l:\''+sl+'\',v:'+v+',c:\''+col+'\'}])" onmouseleave="htt()"></div>';
    }).join("");
    var vl=series.length===1?num(d[series[0].k]):"";
    var fs=data.length>7?8:10;
    return'<div class="bar-col">'+bars+'<div class="bar-val">'+vl+'</div><div class="bar-lbl" style="font-size:'+fs+'px">'+d[lk]+'</div></div>';
  }).join("");
  var legend="";
  if(opts.legend&&series.length>1){
    legend='<div class="leg">'+series.map(function(s){return'<div class="leg-item"><div class="leg-sq" style="background:'+s.c+'"></div>'+s.l+'</div>';}).join("")+'</div>';
  }
  el.innerHTML='<div class="bar-wrap"><div class="bar-group">'+cols+'</div>'+legend+'</div>';
}

function lineChart(el,data,xk,yk){
  if(!el||!data.length){if(el)el.innerHTML=nd();return;}
  var W=480,H=150,PL=30,PT=8,PR=16,PB=28;
  var iW=W-PL-PR,iH=H-PT-PB;
  var maxY=Math.max.apply(null,[1].concat(data.map(function(d){return d[yk];})));
  var xs=data.map(function(_,i){return PL+(i/Math.max(data.length-1,1))*iW;});
  var ys=data.map(function(d){return PT+iH-(d[yk]/maxY)*iH;});
  var pts=xs.map(function(x,i){return x+","+ys[i];}).join(" ");
  var fill=pts+" "+(PL+iW)+","+(PT+iH)+" "+PL+","+(PT+iH);
  var ticks=[0,Math.round(maxY/2),maxY].map(function(v){
    var y=PT+iH-(v/maxY)*iH;
    return'<line x1="'+PL+'" y1="'+y+'" x2="'+(PL+iW)+'" y2="'+y+'" stroke="#F3F4F6" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(y+4)+'" font-size="9" fill="#9CA3AF" text-anchor="end">'+v+'</text>';
  }).join("");
  var dots=data.map(function(d,i){
    var lbl=String(d[xk]).replace(/['"]/g,"");
    var fsx=data.length>5?8:10;
    return'<circle cx="'+xs[i]+'" cy="'+ys[i]+'" r="4.5" fill="#7C3AED" stroke="#fff" stroke-width="2" style="cursor:pointer" onmouseenter="stt(event,\''+lbl+'\',[{l:\'Submissions\',v:'+d[yk]+',c:\'#7C3AED\'}])" onmouseleave="htt()"/>'+
      '<text x="'+xs[i]+'" y="'+(H-3)+'" font-size="'+fsx+'" fill="#9CA3AF" text-anchor="middle">'+d[xk]+'</text>';
  }).join("");
  el.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;overflow:visible">'+
    '<defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7C3AED" stop-opacity=".15"/><stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/></linearGradient></defs>'+
    ticks+'<polygon points="'+fill+'" fill="url(#lg1)"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+
    dots+'</svg>';
}

function pieChart(el,data,cols){
  if(!el)return;
  var total=data.reduce(function(s,d){return s+d.v;},0)||1;
  var R=66,r=40,CX=80,CY=80,ang=-Math.PI/2;
  var slices=data.map(function(d,i){
    var a=(d.v/total)*2*Math.PI;
    if(a<0.001){ang+=a;return null;}
    var x1=CX+R*Math.cos(ang),y1=CY+R*Math.sin(ang);ang+=a;
    var x2=CX+R*Math.cos(ang),y2=CY+R*Math.sin(ang);
    var xi=CX+r*Math.cos(ang-a),yi=CY+r*Math.sin(ang-a);
    var xj=CX+r*Math.cos(ang),yj=CY+r*Math.sin(ang);
    var lg=a>Math.PI?1:0;
    var n=String(d.n).replace(/['"]/g,"");
    return'<path d="M'+xi+','+yi+' A'+r+','+r+' 0 '+lg+' 1 '+xj+','+yj+' L'+x2+','+y2+' A'+R+','+R+' 0 '+lg+' 0 '+x1+','+y1+' Z" fill="'+cols[i]+'" opacity=".92" style="cursor:pointer" onmouseenter="stt(event,\''+n+'\',[{l:\'Count\',v:'+d.v+',c:\''+cols[i]+'\'}])" onmouseleave="htt()"/>';
  }).filter(Boolean).join("");
  var legend=data.map(function(d,i){
    return'<div class="pie-item"><span class="pie-dot" style="background:'+cols[i]+'"></span><span class="pie-nm">'+d.n+'</span><span class="pie-n">'+d.v+'</span></div>';
  }).join("");
  el.innerHTML='<div class="pie-wrap"><svg viewBox="0 0 160 160" width="150" height="150">'+slices+'</svg><div class="pie-legend">'+legend+'</div></div>';
}

function progChart(el,data,total,cols){
  if(!el)return;
  el.innerHTML='<div class="prog-list">'+data.map(function(d,i){
    var pct=total>0?Math.round((d.painted/total)*100):0;
    return'<div><div class="prog-hd"><span class="prog-lbl">'+d.n+'</span><span class="prog-val">'+d.painted+'/'+total+' GPs ('+pct+'%)</span></div>'+
      '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%;background:'+(cols[i]||P[i])+'"></div></div></div>';
  }).join("")+'</div>';
}

// ════════════════════════════════════════════════════════════
// RENDER ALL
// ════════════════════════════════════════════════════════════
function renderAll(){
  var d=DATA, n=d.length;

  // ── KPIs ──
  var kpis=[
    {ico:"📋",lbl:"Total Submissions",       val:n,                                    sub:"Gram Panchayats reporting",  col:"#7C3AED"},
    {ico:"🛡️",lbl:"Child Marriages Prevented",val:sum(d,"cm_prevented"),               sub:"Cases stopped this period",  col:"#DB2777"},
    {ico:"👧",lbl:"Vulnerable Children",      val:sum(d,"vuln_m")+sum(d,"vuln_f"),     sub:sum(d,"vuln_f")+"F + "+sum(d,"vuln_m")+"M identified",col:"#EA580C"},
    {ico:"👥",lbl:"Adolescent Groups",         val:sum(d,"adol_groups"),                sub:"Functional groups formed",   col:"#0D9488"},
    {ico:"🏛️",lbl:"PCWPC Formed",             val:cnt(d,"pcwpc","yes"),                sub:"of "+n+" GPs surveyed",      col:"#2563EB"},
    {ico:"🗺️",lbl:"Vulnerability Mapping",    val:cnt(d,"vuln_map","yes"),             sub:"GPs completed mapping",      col:"#16A34A"},
    {ico:"📣",lbl:"SBC Reach",                val:sum(d,"sbc_reach"),                  sub:"People reached by campaigns",col:"#CA8A04"},
    {ico:"🏫",lbl:"Out-of-School Children",   val:sum(d,"oos_girls")+sum(d,"oos_boys"),sub:sum(d,"oos_girls")+"G + "+sum(d,"oos_boys")+"B identified",col:"#9333EA"},
    {ico:"📚",lbl:"Training Sessions",        val:sum(d,"pcma")+sum(d,"jj")+sum(d,"pocso")+sum(d,"sops"),sub:"PCMA + JJ + POCSO + SOPs",col:"#0891B2"},
    {ico:"🤝",lbl:"Community Participants",   val:sum(d,"cp_m")+sum(d,"cp_f")+sum(d,"cp_g")+sum(d,"cp_b"),sub:"Total in community dialogues",col:"#7C3AED"},
  ];
  document.getElementById("kpi-grid").innerHTML=kpis.map(function(k){
    return'<div class="kpi"><div class="kpi-ico" style="background:'+k.col+'18">'+k.ico+'</div>'+
      '<div><div class="kpi-val" style="color:'+k.col+'">'+k.val+'</div>'+
      '<div class="kpi-lbl">'+k.lbl+'</div>'+
      '<div class="kpi-sub">'+k.sub+'</div></div></div>';
  }).join("");

  // helper: build chart card and attach to row element
  function cc(rowId,id,title){
    var existing=document.getElementById("cc-"+id);
    if(existing)return existing;
    var card=document.createElement("div");card.className="chart-card";
    card.innerHTML='<div class="chart-title">'+title+'</div><div id="cc-'+id+'"></div>';
    document.getElementById(rowId).appendChild(card);
    return document.getElementById("cc-"+id);
  }
  // clear rows
  ["row1","row2","row3","row4"].forEach(function(r){document.getElementById(r).innerHTML="";});

  // ── ROW 1: Submissions over time + CM by District ──
  lineChart(cc("row1","line","Submissions Over Time"),
    (function(){var m={};d.forEach(function(r){m[r.month]=(m[r.month]||0)+1;});
      return Object.entries(m).sort(function(a,b){return a[0]>b[0]?1:-1;}).map(function(e){return{month:e[0],count:e[1]};});
    })(),"month","count");

  barChart(cc("row1","cm-dist","Child Marriages Prevented — by District"),
    grp(d,"district",function(g,r){g.v=(g.v||0)+num(r.cm_prevented);}).sort(function(a,b){return b.v-a.v;}),
    "label",[{k:"v",l:"CM Prevented",c:"#DB2777"}]);

  // ── ROW 2: Training + Community Dialogue ──
  barChart(cc("row2","training","Training Participants by Programme"),
    [{label:"PCMA",v:sum(d,"pcma")},{label:"JJ Act",v:sum(d,"jj")},{label:"POCSO",v:sum(d,"pocso")},{label:"SOPs",v:sum(d,"sops")}],
    "label",[{k:"v",l:"Participants",c:"#7C3AED"}]);

  pieChart(cc("row2","comm","Community Dialogue — by Participant Type"),
    [{n:"Men",v:sum(d,"cp_m")},{n:"Women",v:sum(d,"cp_f")},{n:"Girls",v:sum(d,"cp_g")},{n:"Boys",v:sum(d,"cp_b")}],
    ["#7C3AED","#0D9488","#EA580C","#DB2777"]);

  // ── ROW 3: Vulnerable children + OOS ──
  barChart(cc("row3","vuln","Vulnerable Children — by District"),
    grp(d,"district",function(g,r){g.male=(g.male||0)+num(r.vuln_m);g.female=(g.female||0)+num(r.vuln_f);}),
    "label",[{k:"male",l:"Boys",c:"#2563EB"},{k:"female",l:"Girls",c:"#DB2777"}],{legend:true});

  var oosData=grp(d,"block",function(g,r){g.g=(g.g||0)+num(r.oos_girls);g.b=(g.b||0)+num(r.oos_boys);})
    .filter(function(x){return(x.g||0)+(x.b||0)>0;});
  var oosEl=cc("row3","oos","Out-of-School Children — by Block");
  if(oosData.length) barChart(oosEl,oosData,"label",[{k:"g",l:"Girls",c:"#DB2777"},{k:"b",l:"Boys",c:"#0D9488"}],{legend:true});
  else oosEl.innerHTML=nd();

  // ── ROW 4: Helplines + SBC reach ──
  progChart(cc("row4","hlp","Helpline Numbers Painted in Public Spaces"),
    [{n:"Childhelp 1098",painted:cnt(d,"ch1098","yes")},
     {n:"Police 112",painted:cnt(d,"pol112","yes")},
     {n:"Women HL 181",painted:cnt(d,"wh181","yes")}],
    n,["#7C3AED","#EA580C","#DB2777"]);

  barChart(cc("row4","sbc","SBC Campaign Reach — by District"),
    grp(d,"district",function(g,r){g.v=(g.v||0)+num(r.sbc_reach);}),
    "label",[{k:"v",l:"People Reached",c:"#0D9488"}]);

  // ── DATA TABLE ──
  var cols=["district","block","partner","month","cm_prevented","vuln_m","vuln_f","adol_groups","oos_girls","oos_boys","pcwpc","ch1098","pol112","wh181"];
  var hdrs=["District","Block","Partner","Month","CM Prevented","Vuln Boys","Vuln Girls","Adol Groups","OOS Girls","OOS Boys","PCWPC","1098","112","181"];
  document.getElementById("data-table").innerHTML=
    '<thead><tr>'+hdrs.map(function(h){return'<th>'+h+'</th>';}).join("")+'</tr></thead>'+
    '<tbody>'+d.slice(0,100).map(function(r){
      return'<tr>'+cols.map(function(c){
        var v=r[c];
        if(c==="pcwpc"||c==="ch1098"||c==="pol112"||c==="wh181"){
          v='<span style="color:'+(v==="yes"?"#16A34A":"#DC2626")+'">'+v+'</span>';
        }
        return'<td>'+v+'</td>';
      }).join("")+'</tr>';
    }).join("")+(d.length>100?'<tr><td colspan="'+cols.length+'" style="text-align:center;color:#9CA3AF;padding:12px">Showing first 100 of '+d.length+' records</td></tr>':'')+'</tbody>';

  updFooter();
}

// ════════════════════════════════════════════════════════════
// BOOT — show fallback instantly, then fetch live
// ════════════════════════════════════════════════════════════
// Show built-in data immediately so page is never blank
RAW=FALLBACK.slice();DATA=RAW.slice();
rebuildFilters();renderAll();
// Then fetch live data
loadData(false);
