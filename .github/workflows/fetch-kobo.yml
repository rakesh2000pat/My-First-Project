name: Fetch KoboToolbox Data

on:
  schedule:
   - cron: '*/15 * * * *'
  workflow_dispatch:        # also allows manual run from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data from KoboToolbox
        run: |
          curl -s \
            -H "Authorization: Token ${{ secrets.KOBO_TOKEN }}" \
            "https://kf.kobotoolbox.org/api/v2/assets/${{ secrets.KOBO_UID }}/data/?format=json&limit=30000" \
            -o data.json
          echo "Fetched $(cat data.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('results',[])),'submissions')")"

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update: KoboToolbox data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
